# macOS only for now. Short Pipe ships exclusively as a universal mac build
# distributed through the Homebrew cask (see .github/workflows/release-please.yml).
# There are no Windows or Linux targets; add them here if that ever changes.
appId: com.shortpipe.app
productName: Short Pipe
copyright: Copyright (c) 2026 Kun Chen
artifactName: ${productName}-${version}-${os}-${arch}.${ext}

directories:
  output: dist
  buildResources: build

asar: true

files:
  - out/**/*
  - package.json
  - "!**/*.map"
  - "!**/*.md"

# Bundled skills (shorts-from-longform). Copied verbatim to resourcesPath/skills
# so the SKILL.md files survive the `!**/*.md` filter above and the agent can
# read them on disk at runtime.
extraResources:
  - from: skills
    to: skills

mac:
  category: public.app-category.video
  icon: build/icon.icns
  target:
    - target: dmg
      arch:
        - arm64
        - x64
    - target: zip
      arch:
        - arm64
        - x64
  identity: null
  hardenedRuntime: false
  gatekeeperAssess: false
  # @mariozechner/clipboard (pulled in by pi-coding-agent) ships prebuilt
  # per-arch .node binaries as separate packages. They are byte-identical across
  # the x64 and arm64 app slices, so @electron/universal needs them flagged here
  # or it aborts the universal merge ("same in both ... not covered by the
  # x64ArchFiles rule"). The glob covers every @mariozechner clipboard binary.
  # Pair this with supportedArchitectures in pnpm-workspace.yaml.
  x64ArchFiles: Contents/Resources/app.asar.unpacked/node_modules/@mariozechner/**

dmg:
  writeUpdateInfo: false

publish: null
