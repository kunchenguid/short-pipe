<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body { margin: 0; background: var(--paper); font-family: var(--font-ui); }
  .wrap { padding: 32px; display: flex; flex-direction: column; gap: 22px; }
  .lockup { display: flex; align-items: baseline; gap: 14px; }
  .mark { font-family: var(--font-display); font-size: 38px; color: var(--ink); letter-spacing: -0.4px; }
  .tagline { font-family: var(--font-ui); font-size: 13px; color: var(--ink-3); }
  .ondark { background: var(--frame); border-radius: var(--radius-3); padding: 20px 24px; display: flex; align-items: baseline; gap: 14px; }
  .ondark .mark { color: var(--ink-on-dark); }
  .ondark .tagline { color: var(--ink-4); }
</style>
</head>
<body>
  <div class="wrap">
    <div class="lockup"><span class="mark">Short Pipe</span><span class="tagline">long-form in, captioned shorts out</span></div>
    <div class="ondark"><span class="mark">Short Pipe</span><span class="tagline">long-form in, captioned shorts out</span></div>
  </div>
</body>
</html>
